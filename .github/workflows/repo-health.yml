name: Repo Health

on:
  workflow_call:
    inputs:
      language:
        description: 'Language: go | kotlin'
        required: true
        type: string
      coverage-floor:
        description: 'Minimum line coverage % — enforced as a hard floor when mode=block (PR fails if below)'
        required: false
        type: number
        default: 90
      max-cyclomatic:
        description: 'Cyclomatic complexity threshold per function'
        required: false
        type: number
        default: 25
      mode:
        description: 'warn | block — block fails the job when any category < 3'
        required: false
        type: string
        default: warn
      pre-test:
        description: 'Optional bash snippet run before `go test` (e.g., to build test fixtures)'
        required: false
        type: string
        default: ''
    secrets:
      GO_MODULES_TOKEN:
        required: false

jobs:
  health:
    name: Repo Health
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure Git for private modules
        if: inputs.language == 'go'
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
        run: |
          if [ -n "${GO_MODULES_TOKEN:-}" ]; then
            git config --global url."https://x-access-token:${GO_MODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Configure Go env
        if: inputs.language == 'go'
        run: |
          go env -w GOPRIVATE=github.com/ditdotdev/*
          go env -w GONOPROXY=github.com/ditdotdev/*
          go env -w GONOSUMDB=github.com/ditdotdev/*
          go env -w GOPROXY=https://proxy.golang.org,direct

      - name: Install measurement tools
        if: inputs.language == 'go'
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Download deps
        if: inputs.language == 'go'
        run: go mod download

      # ---- Kotlin setup -------------------------------------------------
      # Mirrors the Go setup block above for Gradle/Kotlin projects.

      - name: Setup Java
        if: inputs.language == 'kotlin'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        if: inputs.language == 'kotlin'
        uses: gradle/actions/setup-gradle@v6

      - name: Configure Git for private modules (Kotlin)
        if: inputs.language == 'kotlin'
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
        run: |
          # Kotlin projects often resolve private dit Maven deps from
          # repositories that authenticate the same way Go modules do.
          if [ -n "${GO_MODULES_TOKEN:-}" ]; then
            git config --global url."https://x-access-token:${GO_MODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Prepare workspace
        run: mkdir -p .health

      - name: Measure - lint
        if: inputs.language == 'go'
        continue-on-error: true
        run: |
          golangci-lint run --timeout=5m ./... > .health/lint.txt 2>&1 || true
          # Count issue lines (format: file.go:line:col: message)
          grep -cE '\.go:[0-9]+:[0-9]+:' .health/lint.txt > .health/lint-count.txt 2>/dev/null || echo "0" > .health/lint-count.txt

      - name: Measure - lint (Kotlin)
        if: inputs.language == 'kotlin'
        continue-on-error: true
        run: |
          # Run the project's ktlint task if it exists; otherwise skip. Convention across the
          # dit ecosystem is a `ktlint` task registered as a JavaExec wrapping
          # com.pinterest.ktlint:ktlint-cli (see command-executor/build.gradle.kts).
          ./gradlew --no-daemon -q tasks 2>/dev/null | grep -qE '^ktlint(Check)?\b' && \
            ./gradlew --no-daemon ktlint > .health/lint.txt 2>&1 || \
            ./gradlew --no-daemon ktlintCheck > .health/lint.txt 2>&1 || true
          # ktlint output format: file.kt:line:col: message
          grep -cE '\.kts?:[0-9]+:[0-9]+' .health/lint.txt > .health/lint-count.txt 2>/dev/null || echo "0" > .health/lint-count.txt

      - name: Measure - cyclomatic complexity
        if: inputs.language == 'go'
        continue-on-error: true
        run: |
          gocyclo -over ${{ inputs.max-cyclomatic }} . > .health/gocyclo.txt 2>/dev/null || true
          wc -l < .health/gocyclo.txt | tr -d ' ' > .health/gocyclo-count.txt

      - name: Measure - cyclomatic complexity (Kotlin)
        if: inputs.language == 'kotlin'
        continue-on-error: true
        run: |
          # Kotlin complexity via detekt is not universally configured; skip for now.
          # Caller can add detekt locally and gate complexity through their existing CI.
          # Reporting 0 here means the score won't dock points for missing data, but the
          # summary will note it explicitly.
          echo "0" > .health/gocyclo-count.txt

      - name: Pre-test setup (caller-provided)
        if: inputs.language == 'go' && inputs.pre-test != ''
        run: ${{ inputs.pre-test }}

      - name: Measure - tests + coverage
        if: inputs.language == 'go'
        continue-on-error: true
        run: |
          test_start=$(date +%s)
          go test -race -coverprofile=.health/coverage.out -covermode=atomic ./... > .health/test.log 2>&1 || true
          test_end=$(date +%s)
          echo $((test_end - test_start)) > .health/test-time.txt

          # If pre-test built helper binaries with `go build -cover` and
          # exported GOCOVERDIR, those binaries emit subprocess coverage
          # data when they exit. Merge it into the main profile so functions
          # like plugin Serve() and cmd/X/main.go get real coverage signal
          # instead of showing as 0% (Go 1.20+).
          echo "::group::Subprocess coverage merge diagnostics"
          echo "GOCOVERDIR=${GOCOVERDIR:-<unset>}"
          if [ -n "${GOCOVERDIR:-}" ]; then
            echo "Directory exists: $([ -d "$GOCOVERDIR" ] && echo yes || echo no)"
            echo "Contents of GOCOVERDIR:"
            ls -la "$GOCOVERDIR" 2>&1 || echo "(cannot list)"
          fi
          if [ -n "${GOCOVERDIR:-}" ] && [ -d "$GOCOVERDIR" ] && [ -n "$(ls -A "$GOCOVERDIR" 2>/dev/null)" ]; then
            echo "Running covdata textfmt..."
            go tool covdata textfmt -i="$GOCOVERDIR" -o=.health/coverage-subproc.out
            echo "Subproc profile size: $(wc -l < .health/coverage-subproc.out 2>/dev/null || echo 0) lines"
            if [ -s .health/coverage-subproc.out ] && [ -s .health/coverage.out ]; then
              { cat .health/coverage.out; tail -n +2 .health/coverage-subproc.out; } > .health/coverage-merged.out
              mv .health/coverage-merged.out .health/coverage.out
              echo "Merged profile size: $(wc -l < .health/coverage.out) lines"
            else
              echo "Skipping merge: subproc empty or main profile empty"
            fi
          else
            echo "Skipping subprocess coverage merge (GOCOVERDIR unset/empty)"
          fi
          echo "::endgroup::"

          if [ -s .health/coverage.out ]; then
            # Single coverage number — `go tool cover -func` total, unfiltered.
            # Generated code (proto, mocks, _gen.go) and cmd/X/main.go entry
            # points are counted just like hand-written code: if it ships in
            # the binary, it counts. Hiding generated code behind an exclude
            # regex pushes responsibility onto the code generator instead of
            # owning the coverage gap; we report the honest number and let
            # the team decide how to close it (round-trip tests for proto,
            # smoke tests for main, deleting unused mocks, etc.).
            go tool cover -func=.health/coverage.out > .health/coverage-by-func.txt
            tail -1 .health/coverage-by-func.txt | awk '{print $3}' | sed 's/%//' > .health/coverage.txt

            # Per-package summary (from go test output)
            grep -E '^(ok|FAIL|---)\s+github' .health/test.log > .health/coverage-by-pkg.txt 2>/dev/null || true
          else
            echo "0" > .health/coverage.txt
          fi
          # Dump test.log for summary visibility
          cp .health/test.log .health/test-output.txt 2>/dev/null || true

      - name: Measure - tests + coverage (Kotlin)
        if: inputs.language == 'kotlin'
        continue-on-error: true
        run: |
          test_start=$(date +%s)
          # Run test + jacocoTestReport in one invocation. If the project doesn't have
          # jacoco wired, this still runs tests and we'll report 0 coverage with a note.
          ./gradlew --no-daemon test jacocoTestReport > .health/test.log 2>&1 || \
            ./gradlew --no-daemon test > .health/test.log 2>&1 || true
          test_end=$(date +%s)
          echo $((test_end - test_start)) > .health/test-time.txt

          # Walk every jacoco report (handles multi-module repos like delphix-remote) and aggregate
          # LINE counters. Try XML first (richest format), then CSV (more commonly enabled by default).
          # XML structure:
          #   <report ...><counter type="LINE" missed="X" covered="Y"/></report>
          # CSV columns (header row first): GROUP,PACKAGE,CLASS,INSTRUCTION_MISSED,INSTRUCTION_COVERED,
          # BRANCH_MISSED,BRANCH_COVERED,LINE_MISSED,LINE_COVERED,COMPLEXITY_MISSED,...
          total_missed=0
          total_covered=0
          found_report=false

          # XML pass. The standard jacoco layout puts the report at
          # `build/reports/jacoco/<sourceset>/jacocoTestReport.xml`
          # (e.g. `.../jacoco/test/jacocoTestReport.xml`). The previous
          # glob looked for `*Report*/` as the parent directory, which
          # never matched anything — silently reported 0% on every
          # standard-layout Kotlin repo. The new glob matches the file
          # name directly so it works whether the parent dir is `test`,
          # `integrationTest`, or anything else.
          while IFS= read -r -d '' xml; do
            found_report=true
            line=$(grep -oE '<counter[^/]*type="LINE"[^/]*/>' "$xml" | tail -1)
            missed=$(echo "$line" | grep -oE 'missed="[0-9]+"' | grep -oE '[0-9]+' || echo "0")
            covered=$(echo "$line" | grep -oE 'covered="[0-9]+"' | grep -oE '[0-9]+' || echo "0")
            total_missed=$((total_missed + ${missed:-0}))
            total_covered=$((total_covered + ${covered:-0}))
          done < <(find . -path '*/build/reports/jacoco/*/jacocoTestReport.xml' -not -path '*/build/tmp/*' -print0 2>/dev/null)

          # CSV fallback — only if XML pass found nothing. Sum LINE_MISSED (col 8) and LINE_COVERED (col 9).
          if ! $found_report; then
            while IFS= read -r -d '' csv; do
              found_report=true
              read sum_missed sum_covered < <(awk -F',' 'NR > 1 { m += $8; c += $9 } END { print m+0, c+0 }' "$csv")
              total_missed=$((total_missed + ${sum_missed:-0}))
              total_covered=$((total_covered + ${sum_covered:-0}))
            done < <(find . -path '*/build/reports/jacoco/*/jacocoTestReport.csv' -not -path '*/build/tmp/*' -print0 2>/dev/null)
          fi

          if $found_report && [ "$((total_missed + total_covered))" -gt 0 ]; then
            pct=$(awk -v c="$total_covered" -v m="$total_missed" 'BEGIN { printf "%.1f", (c * 100) / (c + m) }')
            echo "$pct" > .health/coverage.txt
            echo "jacoco aggregate: ${total_covered} / $((total_missed + total_covered)) lines covered" > .health/coverage-by-pkg.txt
          else
            echo "0" > .health/coverage.txt
            echo "No jacoco report found. Wire 'plugins { id(\"jacoco\") }' + 'tasks.test { finalizedBy(tasks.jacocoTestReport) }' in build.gradle.kts to enable coverage reporting. Either CSV or XML output is sufficient." > .health/coverage-by-pkg.txt
          fi
          cp .health/test.log .health/test-output.txt 2>/dev/null || true

      # Fail-fast: if the gate is in block mode and coverage is below the
      # floor, exit BEFORE we waste runner minutes on build/vuln/deps. The
      # final score-compute step also checks this, but pulling it forward
      # means a failing PR returns red in ~test-time seconds rather than
      # ~test+build+vuln+deps seconds.
      - name: Coverage gate (fail fast)
        if: inputs.mode == 'block'
        run: |
          coverage=$(cat .health/coverage.txt 2>/dev/null || echo "0")
          coverage_int=${coverage%.*}
          coverage_int=${coverage_int:-0}
          floor_int=$((${{ inputs.coverage-floor }}))
          if [ "$coverage_int" -lt "$floor_int" ]; then
            echo "::error::Coverage gate failed fast: ${coverage}% below floor ${floor_int}%. Skipping remaining health measurements."
            exit 1
          fi
          echo "Coverage gate passed: ${coverage}% >= floor ${floor_int}%"

      - name: Measure - build time
        if: inputs.language == 'go'
        continue-on-error: true
        run: |
          build_start=$(date +%s)
          go build ./... > .health/build.log 2>&1 || true
          build_end=$(date +%s)
          echo $((build_end - build_start)) > .health/build-time.txt

      - name: Measure - build time (Kotlin)
        if: inputs.language == 'kotlin'
        continue-on-error: true
        run: |
          build_start=$(date +%s)
          ./gradlew --no-daemon assemble > .health/build.log 2>&1 || true
          build_end=$(date +%s)
          echo $((build_end - build_start)) > .health/build-time.txt

      - name: Measure - vulnerability scan (Kotlin)
        if: inputs.language == 'kotlin'
        continue-on-error: true
        run: |
          # OWASP dependency-check requires a Gradle plugin per-repo. Until it's standardized
          # across the ecosystem, report 0 (no findings → full score). The summary calls this
          # out so it doesn't look like the scan ran and passed clean.
          echo "0" > .health/vuln-count.txt
          echo "Vulnerability scan not yet wired for Kotlin (would require OWASP dependency-check Gradle plugin per-repo). Skipping; reported as 0." > .health/vuln.txt

      - name: Measure - dependency health (Kotlin)
        if: inputs.language == 'kotlin'
        continue-on-error: true
        run: |
          # Outdated direct-dep count requires the gradle-versions-plugin; not universally wired.
          # Report 0 + LOC + TODO/FIXME density for the hygiene score.
          echo "0" > .health/outdated.txt
          echo "0" > .health/replace.txt
          loc=$(find . -name '*.kt' -not -path './build/*' -not -path '*/build/*' -not -path './.health/*' -print0 2>/dev/null \
            | xargs -0 wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          echo "${loc:-0}" > .health/loc.txt
          todos=$(grep -rE "TODO|FIXME" --include='*.kt' --include='*.kts' . 2>/dev/null | grep -v '/build/' | grep -v '^./.health/' | wc -l)
          echo "${todos:-0}" > .health/todos.txt

      - name: Measure - vulnerability scan
        if: inputs.language == 'go'
        continue-on-error: true
        run: |
          # govulncheck exit codes: 0=no findings, 3=vulnerabilities found, other=tool error
          govulncheck ./... > .health/vuln.txt 2>&1
          gv_exit=$?
          case "$gv_exit" in
            0)
              echo "0" > .health/vuln-count.txt
              ;;
            3)
              count=$(grep -c "^Vulnerability" .health/vuln.txt || echo "0")
              # Defensive: exit 3 means findings exist; if grep missed them, count at least 1
              [ "$count" = "0" ] && count=1
              echo "$count" > .health/vuln-count.txt
              ;;
            *)
              echo "0" > .health/vuln-count.txt
              echo "::warning::govulncheck exited $gv_exit (tool error, scoring as 0 vulns). First 50 lines of output:"
              head -50 .health/vuln.txt
              ;;
          esac

      - name: Measure - dependency health
        if: inputs.language == 'go'
        continue-on-error: true
        run: |
          # Count outdated DIRECT dependencies only (excludes // indirect entries
          # which dependabot does not open PRs for — they're updated transitively
          # when their direct parent is bumped).
          go list -u -m -json all 2>/dev/null \
            | jq -s '[.[] | select(.Indirect != true and .Update != null and .Main != true)] | length' \
            > .health/outdated.txt 2>/dev/null || echo "0" > .health/outdated.txt
          grep -c "^replace" go.mod > .health/replace.txt 2>/dev/null || echo "0" > .health/replace.txt
          loc=$(find . -name '*.go' -not -path './vendor/*' -not -path './.health/*' -print0 2>/dev/null | xargs -0 wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          echo "${loc:-0}" > .health/loc.txt
          todos=$(grep -rE "TODO|FIXME" --include='*.go' . 2>/dev/null | grep -v '^./.health/' | wc -l)
          echo "${todos:-0}" > .health/todos.txt

      - name: Compute scores
        id: score
        run: |
          set -euo pipefail
          read_int() { local v=0; [ -f "$1" ] && v=$(tr -d '[:space:]' < "$1" 2>/dev/null); echo "${v:-0}"; }

          lint_count=$(read_int .health/lint-count.txt)
          cyclo_count=$(read_int .health/gocyclo-count.txt)
          coverage=$(read_int .health/coverage.txt)
          coverage_int=${coverage%.*}
          coverage_int=${coverage_int:-0}
          test_time=$(read_int .health/test-time.txt)
          build_time=$(read_int .health/build-time.txt)
          vuln_count=$(read_int .health/vuln-count.txt)
          outdated=$(read_int .health/outdated.txt)
          replace_count=$(read_int .health/replace.txt)
          loc=$(read_int .health/loc.txt)
          todos=$(read_int .health/todos.txt)
          if [ "$loc" -gt 0 ]; then
            todo_density=$(( todos * 1000 / loc ))
          else
            todo_density=0
          fi

          # Code Quality: lint issues + over-cyclomatic functions
          if   [ "$lint_count" -gt 50 ] || [ "$cyclo_count" -gt 10 ]; then score_quality=1
          elif [ "$lint_count" -gt 20 ] || [ "$cyclo_count" -gt 5 ];  then score_quality=2
          elif [ "$lint_count" -gt 5 ]  || [ "$cyclo_count" -gt 2 ];  then score_quality=3
          elif [ "$lint_count" -gt 0 ]  || [ "$cyclo_count" -gt 0 ];  then score_quality=4
          else                                                              score_quality=5
          fi

          # Coverage
          if   [ "$coverage_int" -ge 85 ]; then score_coverage=5
          elif [ "$coverage_int" -ge 75 ]; then score_coverage=4
          elif [ "$coverage_int" -ge 65 ]; then score_coverage=3
          elif [ "$coverage_int" -ge 50 ]; then score_coverage=2
          else                                  score_coverage=1
          fi

          # Build efficiency
          if   [ "$build_time" -gt 240 ] || [ "$test_time" -gt 480 ]; then score_build=1
          elif [ "$build_time" -gt 120 ] || [ "$test_time" -gt 240 ]; then score_build=2
          elif [ "$build_time" -gt 60 ]  || [ "$test_time" -gt 120 ]; then score_build=3
          elif [ "$build_time" -gt 30 ]  || [ "$test_time" -gt 60 ];  then score_build=4
          else                                                              score_build=5
          fi

          # Dependencies (any vuln or replace directive auto-floors to 1)
          if   [ "$vuln_count" -gt 0 ] || [ "$replace_count" -gt 0 ]; then score_deps=1
          elif [ "$outdated" -gt 10 ];                                then score_deps=2
          elif [ "$outdated" -gt 5 ];                                 then score_deps=3
          elif [ "$outdated" -gt 2 ];                                 then score_deps=4
          else                                                              score_deps=5
          fi

          # Hygiene (TODO/FIXME density per kLOC)
          if   [ "$todo_density" -gt 20 ]; then score_hygiene=1
          elif [ "$todo_density" -gt 10 ]; then score_hygiene=2
          elif [ "$todo_density" -gt 5 ];  then score_hygiene=3
          elif [ "$todo_density" -gt 1 ];  then score_hygiene=4
          else                                  score_hygiene=5
          fi

          total=$(awk "BEGIN { printf \"%.2f\", ($score_quality*0.25 + $score_coverage*0.25 + $score_build*0.20 + $score_deps*0.20 + $score_hygiene*0.10) }")

          coverage_floor='${{ inputs.coverage-floor }}'
          max_cyclo='${{ inputs.max-cyclomatic }}'
          mode='${{ inputs.mode }}'

          {
            echo "## Repo Health Report"
            echo ""
            echo "**Total Score: ${total} / 5.00**  &nbsp;&nbsp; mode: \`${mode}\`"
            echo ""
            echo "| Category | Score | Weight | Measured |"
            echo "|---|---|---|---|"
            echo "| Code Quality | ${score_quality}/5 | 25% | ${lint_count} lint issues, ${cyclo_count} funcs over cyclomatic ${max_cyclo} |"
            echo "| Test Coverage | ${score_coverage}/5 | 25% | ${coverage}% line coverage (floor: ${coverage_floor}%) |"
            echo "| Build Efficiency | ${score_build}/5 | 20% | build ${build_time}s, tests ${test_time}s |"
            echo "| Dependencies | ${score_deps}/5 | 20% | ${outdated} direct deps outdated, ${vuln_count} vulns, ${replace_count} replace directives |"
            echo "| Hygiene | ${score_hygiene}/5 | 10% | ${todos} TODO/FIXME across ${loc} LOC (${todo_density} per kLOC) |"
            echo ""
            if [ -s .health/coverage-by-pkg.txt ] || [ -s .health/test-output.txt ]; then
              echo "<details><summary>Coverage breakdown by package</summary>"
              echo ""
              echo '```'
              if [ -s .health/coverage-by-pkg.txt ]; then
                cat .health/coverage-by-pkg.txt
              fi
              # Also list packages with no test files (often the real coverage drag)
              if [ -s .health/test-output.txt ]; then
                echo ""
                echo "# Packages with [no test files]:"
                grep '\[no test files\]' .health/test-output.txt || echo "  (none)"
              fi
              echo '```'
              echo "</details>"
              echo ""
            fi
            if [ -s .health/coverage-by-func.txt ]; then
              echo "<details><summary>Coverage by function</summary>"
              echo ""
              echo '```'
              cat .health/coverage-by-func.txt
              echo '```'
              echo "</details>"
              echo ""
              # Diagnostic: count statements per package in the profile to find drag
              echo "<details><summary>Statements per file in the coverage profile</summary>"
              echo ""
              echo '```'
              # Each line in coverage.out (after 'mode:' header) is: file:start,end numStmts count
              if [ -s .health/coverage.out ]; then
                tail -n +2 .health/coverage.out \
                  | awk '{ split($1, a, ":"); file=a[1]; n=$2; total[file]+=n; if($3>0) covered[file]+=n; } END { for (f in total) printf "%6d / %6d  (%5.1f%%)  %s\n", covered[f]+0, total[f], (covered[f]+0)/total[f]*100, f }' \
                  | sort -k7
              fi
              echo '```'
              echo "</details>"
              echo ""
            fi
            echo "<details><summary>Scoring rubric</summary>"
            echo ""
            echo "- **Code Quality** — 5: clean lint+complexity. 1: >50 lint issues OR >10 over-cyclomatic functions."
            if [ "${{ inputs.language }}" = "kotlin" ]; then
              echo "- **Coverage** — aggregated from every jacoco XML report under \`*/build/reports/jacoco/*Report*/\` (CSV fallback if XML absent). Multi-module repos sum LINE counters across modules. Generated code (protobuf, grpc, mocks) counts just like hand-written code. 5: ≥85%. 4: ≥75%. 3: ≥65%. 2: ≥50%. 1: <50%."
              echo "- **Build** — 5: build <30s and tests <60s. 1: build >240s or tests >480s. Build = \`./gradlew assemble\`; tests = \`./gradlew test jacocoTestReport\`."
              echo "- **Deps** — **Kotlin metrics not yet wired** (would require OWASP dependency-check Gradle plugin + gradle-versions-plugin). Reported as 0 vulns / 0 outdated / 0 replace until the Kotlin tooling is standardized; the category will score 5 by default. Take this score with a grain of salt for Kotlin repos."
              echo "- **Cyclomatic complexity** — **not yet measured for Kotlin** (would require detekt with the Complexity ruleset configured). Reported as 0 until standardized."
              echo "- **Hygiene** — TODO/FIXME density per kLOC across \`.kt\`/\`.kts\` files. 5: ≤1. 1: >20."
            else
              echo "- **Coverage** — single number from \`go tool cover -func\` (Go) or jacoco LINE counter (Kotlin). Generated code, mocks, and \`cmd/X/main.go\` count just like hand-written code: if it ships, it counts. 5: ≥85%. 4: ≥75%. 3: ≥65%. 2: ≥50%. 1: <50%."
              echo "- **Build** — 5: build <30s and tests <60s. 1: build >240s or tests >480s."
              echo "- **Deps** — measures DIRECT deps only (transitive deps are bumped via parents by \`go mod tidy\`). 5: 0 vulns, 0 replace directives, ≤2 direct outdated. 1: any vuln OR any replace directive in master."
              echo "- **Hygiene** — TODO/FIXME density per kLOC. 5: ≤1. 1: >20."
            fi
            echo ""
            echo "Weights: Quality 25%, Coverage 25%, Build 20%, Deps 20%, Hygiene 10%."
            echo "</details>"
          } > .health/summary.md

          cat .health/summary.md >> "$GITHUB_STEP_SUMMARY"

          # Block mode: fail if coverage is below the floor, OR if any
          # category scored below 3. The hard-floor check is enforced
          # independently of the bucket score — a repo at 88% would still
          # score 5/5 on Coverage but fail the gate if the floor is 90.
          # This is what lets us ratchet the ecosystem standard upward
          # one floor bump at a time.
          if [ "$mode" = "block" ]; then
            floor_int=${coverage_floor%.*}
            floor_int=${floor_int:-0}
            if [ "$coverage_int" -lt "$floor_int" ]; then
              echo "::error::Health check failed (mode=block): coverage ${coverage}% below floor ${coverage_floor}%."
              exit 1
            fi
            for s in $score_quality $score_coverage $score_build $score_deps $score_hygiene; do
              if [ "$s" -lt 3 ]; then
                echo "::error::Health check failed (mode=block): one or more categories scored below 3."
                exit 1
              fi
            done
          fi

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('.health/summary.md', 'utf8');
            const marker = '<!-- repo-health-comment -->';
            const body = marker + '\n' + summary;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
